apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-with-affinity
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - db
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: web
          image: nginx
